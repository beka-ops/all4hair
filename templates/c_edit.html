<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Modify Customer Info</title>
</head>
<body>

<nav class="navbar navbar-light" style="background-color: #e3f2fd;">
    <div class ="container-xxl">
        <span class="fw-bold text-secondary">
            ALL4HAIR
        </span>
    </div>
</nav>

<div class="container mt-4">
    <form action="/c_modify" method="POST">

        <label for="fname">First name:</label><br>
          <input type="text" class="form-control" id="firstName" name="firstName" value={{ customer[0][1] }} required><br>

        <label for="lname">Last name:</label><br>
          <input type="text" class="form-control" id="lastName" name="lastName" value={{ customer[0][2] }} required><br>

        <label for="email">Email Address:</label><br>
          <input type="text" class="form-control" id="email" name="emailAddress" value={{ customer[0][3] }} required><br>

        <label for="pnumber">Phone Number:</label><br>
          <input type="text" class="form-control" id="phoneNumber" name="phoneNumber" value={{ customer[0][4] }} required><br>

        <br><input type="hidden" name="customer_id" value={{ customer[0][0] }}>
        <button type="submit" class="btn btn-warning">Update</button>
    </form>
</div>

</body>
</html>
