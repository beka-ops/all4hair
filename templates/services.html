<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Services</title>
</head>
<body>
<h3>View Services</h3></br>

    <table class="table table-striped table-bordered">
        <tr>
            <th>Service Name</th>
            <th>Price</th>
            <th>Time it takes</th>
            <th>Delete</th>
            <th>Update</th>
        </tr>
        {% for services in services %}
        <tr>
            <td>{{services[1]}}</td>
            <td>{{services[2]}}</td>
            <td>{{services[3]}}</td>
            <td><form action="/delete_service" method="POST">
                    <input type="hidden" name="service_id" value={{ services[0] }}>
                    <button type="submit" class="btn btn-danger">Delete</button>
                </form>
            </td>
            <td><form action="/s_modify" method="GET">
                    <input type="hidden" name="service_id" value={{ services[0] }}>
                    <button type="submit" class="btn btn-warning">Update</button>
                </form>
            </td>
        </tr>
        {% endfor %}
    </table>

    <br><br>
    <a href="/s_register">
        <button type="submit" class="btn btn-primary">Add Services</button>
    </a><br>


</body>
</html>
