<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Modify Booking</title>
</head>
<body>

    <nav class="navbar navbar-expand-lg" style="background-color: #91bdff;">
        <div class="container-xxl">
            <a class="navbar-brand d-flex align-items-center" href="/">
                <img src="{{ url_for('static', filename='images/all4hair_logo.jpg') }}" height="45" alt="all4hair logo">
                <span style="color: #6b5816; font-weight: 700; font-size: medium;">All4Hair</span>
            </a>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link fw-semibold" style="color: #6b5816;" href="/view_providers">Providers</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link fw-semibold" style="color: #6b5816;" href="/view_services">Services</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link fw-semibold" style="color: #6b5816;" href="/assign_services">Assign Services</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link fw-semibold" style="color: #6b5816;" href="/view_booking">Bookings</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link fw-semibold" style="color: #6b5816;" href="/paid">Payment History</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link fw-semibold" style="color: #6b5816;" href="/reports">Reports</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav> <br></br>



    <div class="container mt-4">
        <h5 style="color: #6b5816;">Update or Cancel Booking </h5></br>

        <form action="/b_modify" method="POST">

            <label for="book_date" class="form-label">Booking Date:</label><br>
            <input type="datetime-local" class="form-control" id="book_date" name="book_date" value="{{ booking[0][1] }}" required><br>


            <label for="b_status" class="form-label">Status:</label><br>
            <select name="b_status" id="b_status">
                <option value="PENDING" {% if booking[0][2] == 'PENDING' %}selected{% endif %}>PENDING</option>
                <option value="CONFIRMED" {% if booking[0][2] == 'CONFIRMED' %}selected{% endif %}>CONFIRMED</option>
                <option value="CANCELLED" {% if booking[0][2] == 'CANCELLED' %}selected{% endif %}>CANCELLED</option>
                <option value="COMPLETED" {% if booking[0][2] == 'COMPLETED' %}selected{% endif %}>COMPLETED</option>
            </select><br><br>

            <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                <input type="hidden" name="booking_id" value="{{ booking[0][0] }}">
                <button type="submit" class="btn btn-warning">Update</button>
            </div>

        </form>
    </div>




</body>
</html>
