<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Modify Provider Info</title>
</head>
<body>

    {% if error %}
    <div class="alert alert-danger" role="alert">
        {{ error }}
    </div>
    {% endif %}

    <nav class="navbar navbar-expand-lg" style="background-color: #91bdff;">
        <div class="container-xxl">
            <a class="navbar-brand d-flex align-items-center" href="/">
                <img src="{{ url_for('static', filename='images/all4hair_logo.jpg') }}" height="45" alt="all4hair logo">
                <span style="color: #6b5816; font-weight: 700; font-size: medium;">All4Hair</span>
            </a>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link fw-semibold" style="color: #6b5816;" href="/view_providers">Providers</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link fw-semibold" style="color: #6b5816;" href="/view_services">Services</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link fw-semibold" style="color: #6b5816;" href="/assign_services">Assign Services</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link fw-semibold" style="color: #6b5816;" href="/view_booking">Bookings</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link fw-semibold" style="color: #6b5816;" href="/paid">Payment History</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link fw-semibold" style="color: #6b5816;" href="/reports">Reports</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav> <br></br>

<div class="container mt-4">
    <form action="/p_modify" method="POST">

        <br><h5 style="color: #6b5816;">Provider Details</h5><br>

        <label for="fname">First name:</label><br>
          <input type="text" class="form-control" id="fname" name="firstName" value="{{ provider[0][1] }}" required><br>

        <label for="lname">Last name:</label><br>
          <input type="text" class="form-control" id="lname" name="lastName" value="{{ provider[0][2] }}" required><br>

        <label for="bname" class="form-label">Business Name:</label><br>
          <input type="text" class="form-control" id="bname" name="businessName" value="{{ provider[0][3] }}" required><br>

        <label for="email">Email Address:</label><br>
          <input type="text" class="form-control" id="email" name="emailAddress" value="{{ provider[0][4] }}" required><br>

        <label for="pnumber">Phone Number:</label><br>
          <input type="text" class="form-control" id="pnumber" name="phoneNumber" value="{{ provider[0][5] }}" required><br>

        <label for="pstatus" class="form-label">Status:</label><br>
        <select name="pstatus" id="pstatus">
            <option value="active">Active</option>
            <option value="inactive">Inactive</option>
        </select><br><br>

        <br><h5 style="color: #6b5816;">Location</h5><br>

        <label for="sname" class="form-label">Street Name:</label>
        <input type="text" class="form-control" id="sname" name="streetName" value="{{ location[0][1] }}" required><br>

        <label for="cname" class="from-label">City:</label>
        <input type="text" class="form-control" id="cname" name="cityName" value="{{ location[0][2] }}" required><br>

        <label for="stname" class="from-label">State:</label>
        <select id="stname" name="stateName" value="{{ location[0][3] }}">
            <option value="AL">Alabama</option>
            <option value="AK">Alaska</option>
            <option value="AZ">Arizona</option>
            <option value="AR">Arkansas</option>
            <option value="CA">California</option>
            <option value="CO">Colorado</option>
            <option value="CT">Connecticut</option>
            <option value="DE">Delaware</option>
            <option value="DC">District Of Columbia</option>
            <option value="FL">Florida</option>
            <option value="GA">Georgia</option>
            <option value="HI">Hawaii</option>
            <option value="ID">Idaho</option>
            <option value="IL">Illinois</option>
            <option value="IN">Indiana</option>
            <option value="IA">Iowa</option>
            <option value="KS">Kansas</option>
            <option value="KY">Kentucky</option>
            <option value="LA">Louisiana</option>
            <option value="ME">Maine</option>
            <option value="MD">Maryland</option>
            <option value="MA">Massachusetts</option>
            <option value="MI">Michigan</option>
            <option value="MN">Minnesota</option>
            <option value="MS">Mississippi</option>
            <option value="MO">Missouri</option>
            <option value="MT">Montana</option>
            <option value="NE">Nebraska</option>
            <option value="NV">Nevada</option>
            <option value="NH">New Hampshire</option>
            <option value="NJ">New Jersey</option>
            <option value="NM">New Mexico</option>
            <option value="NY">New York</option>
            <option value="NC">North Carolina</option>
            <option value="ND">North Dakota</option>
            <option value="OH">Ohio</option>
            <option value="OK">Oklahoma</option>
            <option value="OR">Oregon</option>
            <option value="PA">Pennsylvania</option>
            <option value="RI">Rhode Island</option>
            <option value="SC">South Carolina</option>
            <option value="SD">South Dakota</option>
            <option value="TN">Tennessee</option>
            <option value="TX">Texas</option>
            <option value="UT">Utah</option>
            <option value="VT">Vermont</option>
            <option value="VA">Virginia</option>
            <option value="WA">Washington</option>
            <option value="WV">West Virginia</option>
            <option value="WI">Wisconsin</option>
            <option value="WY">Wyoming</option>
        </select><br><br>


        <label for="zip" class="from-label" >Zip Code:</label>
        <input type="number" class="form-control" id="zip" name="zipCode" value="{{ location[0][4] }}" required><br>

        <div class="d-grid gap-2 d-md-flex justify-content-md-end">
            <br><input type="hidden" name="provider_id" value="{{ provider[0][0]" }}>
            <input type="hidden" name="location_id" value="{{ location[0][0]" }}>
            <button type="submit" class="btn btn-warning">Update</button>
        </div>

    </form>
</div>

</body>
</html>
