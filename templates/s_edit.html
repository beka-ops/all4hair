<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Edit Services</title>
</head>
<body>

<div class="container mt-4">
    <form action="/s_modify" method="POST">

        <label for="serviceName" class="form-label">Service Name:</label><br>
          <input type="text" class="form-control" id="serviceName" name="serviceName" value="{{ services[0][1] }}" required><br>

        <label for="listedPrice" class="form-label">Price:</label><br>
          <input type="text" class="form-control" id="listedPrice" name="listedPrice" value="{{ services[0][2] }}" required><br>

        <label for="howLong" class="form-label">Time it takes:</label><br>
          <input type="text" class="form-control" id="howLong" name="howLong" value="{{ services[0][3] }}" required><br>

        <br><input type="hidden" name="service_id" value="{{ services[0][0] }}">
        <button type="submit" class="btn btn-warning">Update</button>
    </form>
</div>

</body>
</html>
