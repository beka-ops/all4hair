<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Edit Services</title>
</head>
<body>

    <nav class="navbar navbar-expand-lg" style="background-color: #91bdff;">
        <div class="container-xxl">
            <a class="navbar-brand d-flex align-items-center" href="/">
                <img src="{{ url_for('static', filename='images/all4hair_logo.jpg') }}" height="45" alt="all4hair logo">
                <span style="color: #6b5816; font-weight: 700; font-size: medium;">All4Hair</span>
            </a>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link fw-semibold" style="color: #6b5816;" href="/view_providers">Providers</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link fw-semibold" style="color: #6b5816;" href="/view_services">Services</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link fw-semibold" style="color: #6b5816;" href="/assign_services">Assign Services</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link fw-semibold" style="color: #6b5816;" href="/view_booking">Bookings</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link fw-semibold" style="color: #6b5816;" href="/paid">Payment History</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link fw-semibold" style="color: #6b5816;" href="/reports">Reports</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav> <br></br>

<div class="container mt-4">
    <form action="/s_modify" method="POST">

        <label for="serviceName" class="form-label">Service Name:</label><br>
          <input type="text" class="form-control" id="serviceName" name="serviceName" value="{{ services[0][1] }}" required><br>

        <label for="listedPrice" class="form-label">Price:</label><br>
          <input type="text" class="form-control" id="listedPrice" name="listedPrice" value="{{ services[0][2] }}" required><br>

        <label for="howLong" class="form-label">Time it takes:</label><br>
          <input type="text" class="form-control" id="howLong" name="howLong" value="{{ services[0][3] }}" required><br>

        <br><input type="hidden" name="service_id" value="{{ services[0][0] }}">
        <button type="submit" class="btn btn-warning">Update</button>
    </form>
</div>

</body>
</html>
