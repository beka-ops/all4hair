<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Provider and Services</title>
</head>
<body>
<nav class="navbar navbar-light" style="background-color: #e3f2fd;">
    <div class ="container-xxl">
        <span class="fw-bold text-secondary">
            ALL4HAIR
        </span>
    </div>
</nav> </br>

    <h3>Customer</h3></br>
    <label>I am: </label>
    <select name="c_id">
        {% for customer in customers %}
            <option value="{{ customer[0] }}">{{ customer[1] }} {{ customer[2] }}</option>
        {% endfor %}
    </select>

    </br></br>
    <h3>View Service Listing</h3></br>

    <table class="table table-striped table-bordered">
        <tr>
            <th>Name</th>
            <th>Business</th>
            <th>Service</th>
            <th>Price</th>
            <th>Time</th>
            <th>City</th>
            <th>State</th>
            <th>Favorite</th>
            <th>Book</th>
        </tr>
        {% for list in psl %}
        <tr>
            <td>{{list[3]}}</td>
            <td>{{list[4]}}</td>
            <td>{{list[5]}}</td>
            <td>{{list[6]}}</td>
            <td>{{list[7]}}</td>
            <td>{{list[8]}}</td>
            <td>{{list[9]}}</td>
            <td><form action="/add_favs" method="POST">
                    <input type="hidden" name="provider_id" value="{{ list[0] }}">
                    <input type="hidden" name="service_id" value="{{ list[1] }}">
                    <input type="hidden" name="customer_id" value="5">  <!-- HARDCODED VALUE CURRENTLY -->
                    <button type="submit" class="btn btn-danger">Favorite</button>
                </form>
            </td>
            <td><form action="/booking" method="GET">
                    <input type="hidden" name="provider_id" value={{ list[1] }}>
                    <input type="hidden" name="service_id" value={{ list[2] }}>
                    <input type="hidden" name="location_id" value={{ list[0] }}>
                    <input type="hidden" name="customer_id" value="7">  <!-- HARDCODED VALUE CURRENTLY -->
                    <button type="submit" class="btn btn-primary">Book</button>
                </form>
            </td>
        </tr>
        {% endfor %}
    </table>


</body>
</html>
