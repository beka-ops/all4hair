<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Provider Registration</title>
</head>
<body>
<nav class="navbar navbar-light" style="background-color: #e3f2fd;">
    <div class ="container-xxl">
        <span class="fw-bold text-secondary">
            ALL4HAIR
        </span>
    </div>
</nav>

    {% if error %}
    <div class="alert alert-danger" role="alert">
        {{ error }}
    </div>
    {% endif %}

<div class="container mt-4">
    <form action="/p_register" method="POST">

        <br><h3 class="text-center">Provider Registration</h3><br>

        <br><h5>Personal information</h5><br>

        <label for="fname" class="form-label">First name:</label><br>
          <input type="text" class="form-control" id="fname" name="firstName" placeholder="Enter First Name" required><br>

        <label for="lname" class="form-label">Last name:</label><br>
          <input type="text" class="form-control" id="lname" name="lastName" placeholder="Enter Last Name" required><br>

        <label for="bname" class="form-label">Business Name:</label><br>
          <input type="text" class="form-control" id="bname" name="businessName" placeholder="Enter Business Name" required><br>

        <label for="email" class="form-label">Email Address:</label><br>
          <input type="text" class="form-control" id="email" name="emailAddress" placeholder="Enter Email" required><br>

        <label for="pnumber" class="form-label">Phone Number:</label><br>
          <input type="text" class="form-control" id="pnumber" name="phoneNumber" placeholder="Enter Phone Number" required><br>

        <label for="pstatus" class="form-label">Status:</label><br>
        <select name="pstatus" id="pstatus">
            <option value="active">Active</option>
            <option value="inactive">Inactive</option>
        </select><br><br>


        <br><h5>Location</h5><br>

        <label for="sname" class="form-label">Street Name:</label>
        <input type="text" class="form-control" id="sname" name="streetName" placeholder="Enter Street Name" required><br>

        <label for="cname" class="from-label">City:</label>
        <input type="text" class="form-control" id="cname" name="cityName" placeholder="Enter the City" required><br>

        <label for="stname" class="from-label">State:</label>
        <select id="stname" name="stateName">
            <option value="AL">Alabama</option>
            <option value="AK">Alaska</option>
            <option value="AZ">Arizona</option>
            <option value="AR">Arkansas</option>
            <option value="CA">California</option>
            <option value="CO">Colorado</option>
            <option value="CT">Connecticut</option>
            <option value="DE">Delaware</option>
            <option value="DC">District Of Columbia</option>
            <option value="FL">Florida</option>
            <option value="GA">Georgia</option>
            <option value="HI">Hawaii</option>
            <option value="ID">Idaho</option>
            <option value="IL">Illinois</option>
            <option value="IN">Indiana</option>
            <option value="IA">Iowa</option>
            <option value="KS">Kansas</option>
            <option value="KY">Kentucky</option>
            <option value="LA">Louisiana</option>
            <option value="ME">Maine</option>
            <option value="MD">Maryland</option>
            <option value="MA">Massachusetts</option>
            <option value="MI">Michigan</option>
            <option value="MN">Minnesota</option>
            <option value="MS">Mississippi</option>
            <option value="MO">Missouri</option>
            <option value="MT">Montana</option>
            <option value="NE">Nebraska</option>
            <option value="NV">Nevada</option>
            <option value="NH">New Hampshire</option>
            <option value="NJ">New Jersey</option>
            <option value="NM">New Mexico</option>
            <option value="NY">New York</option>
            <option value="NC">North Carolina</option>
            <option value="ND">North Dakota</option>
            <option value="OH">Ohio</option>
            <option value="OK">Oklahoma</option>
            <option value="OR">Oregon</option>
            <option value="PA">Pennsylvania</option>
            <option value="RI">Rhode Island</option>
            <option value="SC">South Carolina</option>
            <option value="SD">South Dakota</option>
            <option value="TN">Tennessee</option>
            <option value="TX">Texas</option>
            <option value="UT">Utah</option>
            <option value="VT">Vermont</option>
            <option value="VA">Virginia</option>
            <option value="WA">Washington</option>
            <option value="WV">West Virginia</option>
            <option value="WI">Wisconsin</option>
            <option value="WY">Wyoming</option>
        </select><br><br>


        <label for="zip" class="from-label">Zip Code:</label>
        <input type="number" class="form-control" id="zip" name="zipCode" placeholder="Enter the Zip Code" required><br>



        <div class="d-grid gap-2 d-md-flex justify-content-md-end">
        <br><button type="submit" class="btn btn-primary">Register Provider</button><br><br>
        </div>


    </form>
</div>

</body>
</html>
