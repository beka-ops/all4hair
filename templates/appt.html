<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Booking</title>
</head>
<body>

    <nav class="navbar navbar-expand-lg" style="background-color: #91bdff;">
        <div class="container-xxl">
            <a class="navbar-brand d-flex align-items-center" href="/">
                <img src="{{ url_for('static', filename='images/all4hair_logo.jpg') }}" height="45" alt="all4hair logo">
                <span style="color: #6b5816; font-weight: 700; font-size: medium;">All4Hair</span>
            </a>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link fw-semibold" style="color: #6b5816;" href="/view_customer">Customers</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link fw-semibold" style="color: #6b5816;" href="/listing">Find a Provider</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link fw-semibold" style="color: #6b5816;" href="/reports">Reports</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav> <br> </br>

    <div class="container mt-5">

    <h3> Book an Appointment </h3> <br></br>

    <form action="/booking" method="POST">

        <input type="hidden" name="provider_id" value="{{ provider_id }}">
        <input type="hidden" name="service_id" value="{{ service_id }}">
        <input type="hidden" name="location_id" value="{{ location_id }}">
        <input type="hidden" name="customer_id" value="7">  <!-- HARDCODED VALUE CURRENTLY -->

        <label for="date_info" class="form-label" >Date: </label>
        <input type="date" id="date_info" name="book_date" class="form-control" required><br></br>

        <label for="time_info" class="form-label" >Time: </label>
        <input type="time" id="time_info" name="book_time" class="form-control" required><br></br>

        <div class="d-grid gap-2 d-md-flex justify-content-md-end">
            <br><button type="submit" class="btn btn-primary">Book</button><br><br>
        </div>
    </form>

    </div>

</body>
</html>
