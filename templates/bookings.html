<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Providers</title>
</head>
<body>
<nav class="navbar navbar-light" style="background-color: #e3f2fd;">
    <div class ="container-xxl">
        <span class="fw-bold text-secondary">
            ALL4HAIR
        </span>
    </div>
</nav> </br>

    <h3>View Providers</h3></br>

    <table class="table table-striped table-bordered">
        <tr>
            <th>Provider Name</th>
            <th>Customer Name</th>
            <th>Customer Email</th>
            <th>Booking Date</th>
            <th>Status</th>
            <th>Service Name</th>
            <th>Location</th>
            <th>Modify/Cancel Booking</th>
        </tr>
        {% for book in booking %}
        <tr>
            <td>{{book[1]}}</td>
            <td>{{book[2]}}</td>
            <td>{{book[3]}}</td>
            <td>{{book[4]}}</td>
            <td>{{book[5]}}</td>
            <td>{{book[6]}}</td>
            <td>{{book[7]}}</td>
            <td><form action="/b_modify" method="GET">
                  <input type="hidden" name="booking_id" value={{ book [0] }}>
                  <button type="submit" class="btn btn-warning">Modify</button>
              </form>
            </td>
        </tr>
        {% endfor %}
    </table>

    <br><br>
    <a href="/listing">
        <button type="submit" class="btn btn-primary">Make Appointment</button>
    </a><br>


</body>
</html>
