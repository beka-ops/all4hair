<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Assign Services</title>
</head>
<body>

        <nav class="navbar navbar-expand-lg" style="background-color: #91bdff;">
        <div class="container-xxl">
            <a class="navbar-brand d-flex align-items-center" href="/">
                <img src="{{ url_for('static', filename='images/all4hair_logo.jpg') }}" height="45" alt="all4hair logo">
                <span style="color: #6b5816; font-weight: 700; font-size: medium;">All4Hair</span>
            </a>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link fw-semibold" style="color: #6b5816;" href="/listing">Find a Provider</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link fw-semibold" style="color: #6b5816;" href="/view_booking">Bookings</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link fw-semibold" style="color: #6b5816;" href="/view_customer">Customers</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link fw-semibold" style="color: #6b5816;" href="/view_providers">Providers</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link fw-semibold" style="color: #6b5816;" href="/view_services">Services</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link fw-semibold" style="color: #6b5816;" href="/assign_services">Assign Services</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav> <br></br>


    <div class="container mt-5">
        <h3>Assign Provider a Service </h3></br>

        <form action="/assign_services" method="POST">
            <label>Associate Provider: </label>
            <select name="provider_drop">
                {% for provider in providers %}
                <option value="{{ provider[0] }}"> {{ provider[1] }} {{ provider[2] }}</option>
                {% endfor %}

            </select>

            <label>to service </label>
            <select name="service_drop">
                {% for service in services %}
                <option value="{{ service[0] }}"> {{ service[1] }} {{ service[2] }}</option>
                {% endfor %}

            </select> <br><br>

            <div class="d-grid gap-2 d-md-flex justify-content-md-end">
            <br><button type="submit" class="btn btn-primary"> Associate </button><br><br>
            </div>

        </form>
    </div>

</body>
</html>
