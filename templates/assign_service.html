<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Assign Services</title>
</head>
<body>

    <nav class="navbar navbar-light" style="background-color: #e3f2fd;">
        <div class ="container-xxl">
            <span class="fw-bold text-secondary">
                ALL4HAIR
            </span>
        </div>
    </nav></br>

    <h3>Assign Provider a Service </h3></br>

    <form action="/assign_services" method="POST">
        <label>Associate Provider: </label>
        <select name="provider_drop">
            {% for provider in providers %}
            <option value="{{ provider[0] }}"> {{ provider[1] }} {{ provider[2] }}</option>
            {% endfor %}

        </select>

        <label>to service </label>
        <select name="service_drop">
            {% for service in services %}
            <option value="{{ service[0] }}"> {{ service[1] }} {{ service[2] }}</option>
            {% endfor %}

        </select> <br><br>

        <div class="d-grid gap-2 d-md-flex justify-content-md-end">
        <br><button type="submit" class="btn btn-primary"> Associate </button><br><br>
        </div>

    </form>


</body>
</html>
