<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Register Services</title>
</head>
<body>


<div class="container mt-4">
    <form action="/s_register" method="POST">

        <label for="serviceName" class="form-label">Service Name:</label><br>
          <input type="text" class="form-control" id="serviceName" name="serviceName" placeholder="Enter Service Name" required><br>

        <label for="listedPrice" class="form-label">Price:</label><br>
          <input type="text" class="form-control" id="listedPrice" name="listedPrice" placeholder="Price of Service" required><br>

        <label for="howLong" class="form-label">Time it takes:</label><br>
          <input type="text" class="form-control" id="howLong" name="howLong" placeholder="Enter Time for Service (hh:mm:ss)" required><br>

        <br><button type="submit" class="btn btn-primary">Create</button>
    </form>
</div>


</body>
</html>
