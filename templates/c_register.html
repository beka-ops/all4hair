<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Customer Registration</title>
</head>
<body>

    <nav class="navbar navbar-expand-lg" style="background-color: #91bdff;">
        <div class="container-xxl">
            <a class="navbar-brand d-flex align-items-center" href="/">
                <img src="{{ url_for('static', filename='images/all4hair_logo.jpg') }}" height="45" alt="all4hair logo">
                <span style="color: #6b5816; font-weight: 700; font-size: medium;">All4Hair</span>
            </a>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link fw-semibold" style="color: #6b5816;" href="/view_customer">Customers</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link fw-semibold" style="color: #6b5816;" href="/listing">Find a Provider</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link fw-semibold" style="color: #6b5816;" href="/reports">Reports</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav> <br> </br>


    {% if error %}
    <div class="alert alert-danger" role="alert">
        {{ error }}
    </div>
    {% endif %}

<div class="container mt-4">
    <form action="/c_register" method="POST">

        <label for="fname" class="form-label">First name:</label><br>
          <input type="text" class="form-control" id="firstName" name="firstName" placeholder="Enter First Name" required><br>

        <label for="lname" class="form-label">Last name:</label><br>
          <input type="text" class="form-control" id="lastName" name="lastName" placeholder="Enter Last Name" required><br>

        <label for="email" class="form-label">Email Address:</label><br>
          <input type="text" class="form-control" id="eamil" name="emailAddress" placeholder="Enter Email" required><br>

        <label for="pnumber" class="form-label">Phone Number:</label><br>
          <input type="text" class="form-control" id="phoneNumber" name="phoneNumber" placeholder="Enter Phone Number" required><br>

        <br><button type="submit" class="btn btn-primary">Register User</button>
    </form>
</div>

</body>
</html>
