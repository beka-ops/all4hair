<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Customer Registration</title>
</head>
<body>


    {% if error %}
    <div class="alert alert-danger" role="alert">
        {{ error }}
    </div>
    {% endif %}

<div class="container mt-4">
    <form action="/c_register" method="POST">

        <label for="fname" class="form-label">First name:</label><br>
          <input type="text" class="form-control" id="firstName" name="firstName" placeholder="Enter First Name" required><br>

        <label for="lname" class="form-label">Last name:</label><br>
          <input type="text" class="form-control" id="lastName" name="lastName" placeholder="Enter Last Name" required><br>

        <label for="email" class="form-label">Email Address:</label><br>
          <input type="text" class="form-control" id="eamil" name="emailAddress" placeholder="Enter Email" required><br>

        <label for="pnumber" class="form-label">Phone Number:</label><br>
          <input type="text" class="form-control" id="phoneNumber" name="phoneNumber" placeholder="Enter Phone Number" required><br>

        <br><button type="submit" class="btn btn-primary">Register User</button>
    </form>
</div>

</body>
</html>
